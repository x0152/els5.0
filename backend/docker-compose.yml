name: els5

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
      TZ: ${TZ}
      PGTZ: ${PGTZ}
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}"]
      interval: 5s
      timeout: 3s
      retries: 10

  spacy:
    profiles: ["spacy"]
    build:
      context: ../services/spacy
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"

  speech:
    profiles: ["speech"]
    build:
      context: ../services/speech
      dockerfile: Dockerfile
      args:
        HF_TOKEN: ${HF_TOKEN:-}
    environment:
      HF_HUB_OFFLINE: "1"
    volumes:
      - ${HOME}/.cache/huggingface/hub:/home/appuser/.cache/huggingface/hub:ro
    restart: unless-stopped
    ports:
      - "8001:8000"

  tts:
    build:
      context: ../services/tts
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8002:8000"

  redis:
    image: redis:7-alpine
    environment:
      TZ: ${TZ}
    ports:
      - "6381:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
      TZ: ${TZ}
    command: ["server", "/data", "--console-address", ":9001"]
    expose:
      - "9000"
      - "9001"
    ports:
      - "127.0.0.1:9003:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_AVATAR_BUCKET: ${S3_AVATAR_BUCKET}
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 $$S3_ACCESS_KEY $$S3_SECRET_KEY &&
        mc mb --ignore-existing local/$$S3_AVATAR_BUCKET
      "
    restart: "no"

  migrator:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      TZ: ${TZ}
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    command: ["go", "run", "./cmd/migrator", "-direction=up"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  bootstrap:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      TZ: ${TZ}
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    command: ["go", "run", "./tools/bootstrap"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_ADDR: redis:6379
      S3_ENDPOINT: minio:9000
      SPACY_URL: http://spacy:8000
      SPEECH_URL: http://speech:8000
      TTS_URL: http://tts:8000
      TZ: ${TZ}
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    command: ["air", "-c", ".air.toml"]
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      bootstrap:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

volumes:
  postgres-data:
  redis-data:
  minio-data:
  go-mod-cache:
  go-build-cache:
