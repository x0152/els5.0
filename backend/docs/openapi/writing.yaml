components:
  schemas:
    CheckResult:
      additionalProperties: false
      properties:
        error:
          type: string
        name:
          examples:
            - postgres
          type: string
        ok:
          type: boolean
      required:
        - name
        - ok
      type: object
    ErrorBody:
      additionalProperties: false
      properties:
        code:
          type: string
        details:
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        message:
          type: string
      required:
        - code
        - message
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        field:
          type: string
        message:
          type: string
      required:
        - message
      type: object
    ErrorResponse:
      additionalProperties: false
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - error
      type: object
    GenerateSituationInputBody:
      additionalProperties: false
      properties:
        topic:
          description: Optional topic for the situation
          maxLength: 200
          type: string
      type: object
    HealthOutput:
      additionalProperties: false
      properties:
        module:
          examples:
            - auth
          type: string
        status:
          examples:
            - ok
          type: string
        time:
          format: date-time
          type: string
      required:
        - status
        - time
      type: object
    Meta:
      additionalProperties: false
      properties:
        pagination:
          $ref: "#/components/schemas/Pagination"
        request_id:
          type: string
      type: object
    Pagination:
      additionalProperties: false
      properties:
        has_more:
          type: boolean
        limit:
          format: int64
          type: integer
        offset:
          format: int64
          type: integer
        total:
          format: int64
          type: integer
      required:
        - limit
        - offset
        - total
        - has_more
      type: object
    ReadyOutput:
      additionalProperties: false
      properties:
        checks:
          items:
            $ref: "#/components/schemas/CheckResult"
          type:
            - array
            - "null"
        module:
          examples:
            - auth
          type: string
        ready:
          type: boolean
        time:
          format: date-time
          type: string
      required:
        - ready
        - time
      type: object
    SituationOutput:
      additionalProperties: false
      properties:
        dialogue:
          type: string
        scenario:
          type: string
      required:
        - scenario
        - dialogue
      type: object
    SuccessBodyHealthOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/HealthOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyReadyOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/ReadyOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodySituationOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/SituationOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyTrainerCheckOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/TrainerCheckOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    TrainerCheckInputBody:
      additionalProperties: false
      properties:
        dialogue:
          description: Dialogue context the draft replies to
          maxLength: 3000
          type: string
        draft:
          description: Draft reply to check
          maxLength: 2000
          minLength: 1
          type: string
        level:
          description: "Strictness: 1 grammar, 2 natural, 3 native"
          format: int64
          maximum: 3
          minimum: 1
          type: integer
      required:
        - draft
        - level
      type: object
    TrainerCheckOutput:
      additionalProperties: false
      properties:
        comment:
          type: string
        issues:
          items:
            $ref: "#/components/schemas/TrainerIssueOutput"
          type:
            - array
            - "null"
        pass:
          type: boolean
      required:
        - pass
        - comment
        - issues
      type: object
    TrainerIssueOutput:
      additionalProperties: false
      properties:
        fragment:
          type: string
        hint:
          type: string
        severity:
          enum:
            - grammar
            - style
            - native
          type: string
      required:
        - fragment
        - severity
        - hint
      type: object
info:
  title: writing
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/v1/writing/trainer/check:
    post:
      operationId: writingTrainerCheck
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrainerCheckInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyTrainerCheckOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Check a draft reply without revealing corrections
      tags:
        - writing
  /api/v1/writing/trainer/situations:
    post:
      operationId: writingGenerateSituation
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateSituationInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodySituationOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Generate a dialogue situation to reply to
      tags:
        - writing
  /health:
    get:
      description: Returns 200 if the process is alive. Does not depend on external services.
      operationId: health
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyHealthOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Liveness probe
      tags:
        - probes
  /ready:
    get:
      description: Returns 200 if the module is ready to accept traffic (all dependencies alive). 503 if any check failed.
      operationId: ready
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyReadyOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Readiness probe
      tags:
        - probes
