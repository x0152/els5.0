components:
  schemas:
    CheckResult:
      additionalProperties: false
      properties:
        error:
          type: string
        name:
          examples:
            - postgres
          type: string
        ok:
          type: boolean
      required:
        - name
        - ok
      type: object
    CorrectionOutput:
      additionalProperties: false
      properties:
        correction:
          type: string
        description:
          type: string
        fragment:
          type: string
        sentence:
          type: string
      required:
        - sentence
        - fragment
        - correction
        - description
      type: object
    EntriesOutput:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/EntryOutput"
          type:
            - array
            - "null"
        limit:
          format: int32
          type: integer
        offset:
          format: int32
          type: integer
        total:
          format: int64
          type: integer
      required:
        - items
        - total
        - limit
        - offset
      type: object
    EntryOutput:
      additionalProperties: false
      properties:
        corrections:
          items:
            $ref: "#/components/schemas/CorrectionOutput"
          type:
            - array
            - "null"
        created_at:
          format: date-time
          type: string
        date:
          type: string
        id:
          type: string
        native_sample:
          type: string
        next_question:
          type: string
        question:
          type: string
        reply:
          type: string
        text:
          type: string
      required:
        - id
        - date
        - text
        - reply
        - corrections
        - created_at
      type: object
    ErrorBody:
      additionalProperties: false
      properties:
        code:
          type: string
        details:
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        message:
          type: string
      required:
        - code
        - message
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        field:
          type: string
        message:
          type: string
      required:
        - message
      type: object
    ErrorResponse:
      additionalProperties: false
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - error
      type: object
    HealthOutput:
      additionalProperties: false
      properties:
        module:
          examples:
            - auth
          type: string
        status:
          examples:
            - ok
          type: string
        time:
          format: date-time
          type: string
      required:
        - status
        - time
      type: object
    Meta:
      additionalProperties: false
      properties:
        pagination:
          $ref: "#/components/schemas/Pagination"
        request_id:
          type: string
      type: object
    Pagination:
      additionalProperties: false
      properties:
        has_more:
          type: boolean
        limit:
          format: int64
          type: integer
        offset:
          format: int64
          type: integer
        total:
          format: int64
          type: integer
      required:
        - limit
        - offset
        - total
        - has_more
      type: object
    ReadyOutput:
      additionalProperties: false
      properties:
        checks:
          items:
            $ref: "#/components/schemas/CheckResult"
          type:
            - array
            - "null"
        module:
          examples:
            - auth
          type: string
        ready:
          type: boolean
        time:
          format: date-time
          type: string
      required:
        - ready
        - time
      type: object
    ResetHistoryOutput:
      additionalProperties: false
      type: object
    SubmitEntryInputBody:
      additionalProperties: false
      properties:
        question:
          description: The question the entry answers
          maxLength: 500
          type: string
        text:
          description: Diary entry text in English
          maxLength: 5000
          minLength: 1
          type: string
      required:
        - text
      type: object
    SuccessBodyEntriesOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/EntriesOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyEntryOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/EntryOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyHealthOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/HealthOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyReadyOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/ReadyOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyResetHistoryOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/ResetHistoryOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyTodayOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/TodayOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyTrainerCheckOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/TrainerCheckOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    TodayOutput:
      additionalProperties: false
      properties:
        entry:
          $ref: "#/components/schemas/EntryOutput"
        question:
          type: string
        streak:
          format: int64
          type: integer
        warmup:
          items:
            $ref: "#/components/schemas/CorrectionOutput"
          type:
            - array
            - "null"
      required:
        - question
        - warmup
        - streak
      type: object
    TrainerCheckInputBody:
      additionalProperties: false
      properties:
        dialogue:
          description: Dialogue context the draft replies to
          maxLength: 3000
          type: string
        draft:
          description: Draft reply to check
          maxLength: 2000
          minLength: 1
          type: string
        level:
          description: "Strictness: 1 grammar, 2 natural, 3 native"
          format: int64
          maximum: 3
          minimum: 1
          type: integer
      required:
        - draft
        - level
      type: object
    TrainerCheckOutput:
      additionalProperties: false
      properties:
        comment:
          type: string
        issues:
          items:
            $ref: "#/components/schemas/TrainerIssueOutput"
          type:
            - array
            - "null"
        pass:
          type: boolean
      required:
        - pass
        - comment
        - issues
      type: object
    TrainerIssueOutput:
      additionalProperties: false
      properties:
        fragment:
          type: string
        hint:
          type: string
        severity:
          enum:
            - grammar
            - style
            - native
          type: string
      required:
        - fragment
        - severity
        - hint
      type: object
info:
  title: diary
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/v1/diary/entries:
    delete:
      operationId: diaryResetHistory
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
      responses:
        "204":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyResetHistoryOutput"
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Delete all diary entries of the account
      tags:
        - diary
    get:
      operationId: diaryListEntries
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - explode: false
          in: query
          name: limit
          schema:
            default: 30
            format: int32
            maximum: 100
            minimum: 1
            type: integer
        - explode: false
          in: query
          name: offset
          schema:
            default: 0
            format: int32
            minimum: 0
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyEntriesOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: List past diary entries
      tags:
        - diary
    post:
      operationId: diarySubmitEntry
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitEntryInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyEntryOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Submit today's entry and get the friend reply with corrections
      tags:
        - diary
  /api/v1/diary/today:
    get:
      operationId: diaryToday
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyTodayOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: "Today's diary state: question, warmup and streak"
      tags:
        - diary
  /api/v1/diary/trainer/check:
    post:
      operationId: diaryTrainerCheck
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrainerCheckInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyTrainerCheckOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Check a draft reply without revealing corrections
      tags:
        - diary
  /health:
    get:
      description: Returns 200 if the process is alive. Does not depend on external services.
      operationId: health
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyHealthOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Liveness probe
      tags:
        - probes
  /ready:
    get:
      description: Returns 200 if the module is ready to accept traffic (all dependencies alive). 503 if any check failed.
      operationId: ready
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyReadyOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Readiness probe
      tags:
        - probes
