components:
  schemas:
    AddItemInputBody:
      additionalProperties: false
      properties:
        text:
          description: Word or phrase to study
          maxLength: 500
          minLength: 1
          type: string
      required:
        - text
      type: object
    AreaOutput:
      additionalProperties: false
      properties:
        created_at:
          format: date-time
          type: string
        done:
          format: int64
          type: integer
        due:
          format: int64
          type: integer
        icon:
          type: string
        id:
          type: string
        title:
          type: string
        total:
          format: int64
          type: integer
      required:
        - id
        - title
        - total
        - done
        - due
        - created_at
      type: object
    AreasOutput:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/AreaOutput"
          type:
            - array
            - "null"
      required:
        - items
      type: object
    CaptureItemInputBody:
      additionalProperties: false
      properties:
        area:
          description: Target area title, created if missing
          maxLength: 200
          minLength: 1
          type: string
        icon:
          description: Lucide icon name for a newly created area
          maxLength: 32
          type: string
        text:
          description: Word or phrase to study
          maxLength: 500
          minLength: 1
          type: string
      required:
        - text
        - area
      type: object
    CheckReplyInputBody:
      additionalProperties: false
      properties:
        reply:
          maxLength: 2000
          minLength: 1
          type: string
      required:
        - reply
      type: object
    CheckReplyOutput:
      additionalProperties: false
      properties:
        comment:
          type: string
        ok:
          type: boolean
      required:
        - ok
        - comment
      type: object
    CheckResult:
      additionalProperties: false
      properties:
        error:
          type: string
        name:
          examples:
            - postgres
          type: string
        ok:
          type: boolean
      required:
        - name
        - ok
      type: object
    CreateAreaInputBody:
      additionalProperties: false
      properties:
        icon:
          description: Lucide icon name, e.g. coffee
          maxLength: 32
          type: string
        title:
          maxLength: 200
          minLength: 1
          type: string
      required:
        - title
      type: object
    DeleteAreaOutput:
      additionalProperties: false
      type: object
    DeleteItemOutput:
      additionalProperties: false
      type: object
    ErrorBody:
      additionalProperties: false
      properties:
        code:
          type: string
        details:
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        message:
          type: string
      required:
        - code
        - message
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        field:
          type: string
        message:
          type: string
      required:
        - message
      type: object
    ErrorResponse:
      additionalProperties: false
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - error
      type: object
    HealthOutput:
      additionalProperties: false
      properties:
        module:
          examples:
            - auth
          type: string
        status:
          examples:
            - ok
          type: string
        time:
          format: date-time
          type: string
      required:
        - status
        - time
      type: object
    ItemOutput:
      additionalProperties: false
      properties:
        area_id:
          type: string
        created_at:
          format: date-time
          type: string
        example:
          type: string
        explanation:
          type: string
        explanation_native:
          type: string
        id:
          type: string
        listened:
          type: boolean
        next_review_at:
          format: date-time
          type: string
        recalled:
          type: boolean
        review_stage:
          format: int64
          type: integer
        spoken:
          type: boolean
        task:
          type: string
        text:
          type: string
        transcription:
          type: string
        translation:
          type: string
        written:
          type: boolean
      required:
        - id
        - area_id
        - text
        - listened
        - spoken
        - written
        - recalled
        - review_stage
        - created_at
      type: object
    ItemsOutput:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/ItemOutput"
          type:
            - array
            - "null"
      required:
        - items
      type: object
    MarkSkillInputBody:
      additionalProperties: false
      properties:
        skill:
          enum:
            - listened
            - spoken
            - written
            - recalled
          type: string
      required:
        - skill
      type: object
    Meta:
      additionalProperties: false
      properties:
        pagination:
          $ref: "#/components/schemas/Pagination"
        request_id:
          type: string
      type: object
    Pagination:
      additionalProperties: false
      properties:
        has_more:
          type: boolean
        limit:
          format: int64
          type: integer
        offset:
          format: int64
          type: integer
        total:
          format: int64
          type: integer
      required:
        - limit
        - offset
        - total
        - has_more
      type: object
    ReadyOutput:
      additionalProperties: false
      properties:
        checks:
          items:
            $ref: "#/components/schemas/CheckResult"
          type:
            - array
            - "null"
        module:
          examples:
            - auth
          type: string
        ready:
          type: boolean
        time:
          format: date-time
          type: string
      required:
        - ready
        - time
      type: object
    SuccessBodyAreaOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/AreaOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyAreasOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/AreasOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyCheckReplyOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/CheckReplyOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyDeleteAreaOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/DeleteAreaOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyDeleteItemOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/DeleteItemOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyHealthOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/HealthOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyItemOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/ItemOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyItemsOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/ItemsOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyReadyOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/ReadyOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
info:
  title: studio
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/v1/studio/areas:
    get:
      operationId: studioListAreas
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyAreasOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: List study areas with progress
      tags:
        - studio
    post:
      operationId: studioCreateArea
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAreaInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyAreaOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Create a study area
      tags:
        - studio
  /api/v1/studio/areas/{id}:
    delete:
      operationId: studioDeleteArea
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
      responses:
        "204":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyDeleteAreaOutput"
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Delete a study area with its items
      tags:
        - studio
  /api/v1/studio/areas/{id}/items:
    get:
      operationId: studioListItems
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyItemsOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: List items of a study area
      tags:
        - studio
    post:
      operationId: studioAddItem
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddItemInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyItemOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Add a phrase or word to a study area (AI fills transcription, translation and example)
      tags:
        - studio
  /api/v1/studio/capture:
    post:
      operationId: studioCaptureItem
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaptureItemInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyItemOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Add a phrase to a named area (created if missing) — used by other apps
      tags:
        - studio
  /api/v1/studio/items/{id}:
    delete:
      operationId: studioDeleteItem
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
      responses:
        "204":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyDeleteItemOutput"
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Delete a study item
      tags:
        - studio
  /api/v1/studio/items/{id}/check:
    post:
      operationId: studioCheckReply
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckReplyInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyCheckReplyOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Check the user's reply to the 'use it' task; success marks the written skill
      tags:
        - studio
  /api/v1/studio/items/{id}/example:
    post:
      operationId: studioRegenExample
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyItemOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Regenerate the usage example for an item
      tags:
        - studio
  /api/v1/studio/items/{id}/review:
    post:
      operationId: studioPassReview
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyItemOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Pass the due review of an item and schedule the next one
      tags:
        - studio
  /api/v1/studio/items/{id}/skill:
    post:
      operationId: studioMarkSkill
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkSkillInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyItemOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Mark a skill (listened/spoken/written/recalled) as done for an item
      tags:
        - studio
  /api/v1/studio/items/{id}/task:
    post:
      operationId: studioRegenTask
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: id
          required: true
          schema:
            format: uuid
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyItemOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Generate or regenerate the 'use it' mini-situation for an item
      tags:
        - studio
  /health:
    get:
      description: Returns 200 if the process is alive. Does not depend on external services.
      operationId: health
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyHealthOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Liveness probe
      tags:
        - probes
  /ready:
    get:
      description: Returns 200 if the module is ready to accept traffic (all dependencies alive). 503 if any check failed.
      operationId: ready
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyReadyOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Readiness probe
      tags:
        - probes
