components:
  schemas:
    AssessOutput:
      additionalProperties: false
      properties:
        heard:
          type: string
        overall:
          format: int64
          type: integer
        words:
          items:
            $ref: "#/components/schemas/WordOutput"
          type:
            - array
            - "null"
      required:
        - overall
        - heard
        - words
      type: object
    CheckResult:
      additionalProperties: false
      properties:
        error:
          type: string
        name:
          examples:
            - postgres
          type: string
        ok:
          type: boolean
      required:
        - name
        - ok
      type: object
    ErrorBody:
      additionalProperties: false
      properties:
        code:
          type: string
        details:
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        message:
          type: string
      required:
        - code
        - message
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        field:
          type: string
        message:
          type: string
      required:
        - message
      type: object
    ErrorResponse:
      additionalProperties: false
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - error
      type: object
    FeedbackInputBody:
      additionalProperties: false
      properties:
        heard:
          description: IPA transcription of what was actually said
          maxLength: 2000
          minLength: 1
          type: string
        issues:
          description: "Detected per-phoneme issues, e.g. \"think: expected θ, heard s\""
          items:
            type: string
          maxItems: 100
          type:
            - array
            - "null"
        native_language:
          description: Student's native language for advice wording
          maxLength: 50
          type: string
        text:
          description: Reference text that was read aloud
          maxLength: 500
          minLength: 1
          type: string
      required:
        - text
        - heard
        - native_language
      type: object
    FeedbackOutput:
      additionalProperties: false
      properties:
        summary:
          type: string
        tips:
          items:
            $ref: "#/components/schemas/FeedbackTipOutput"
          type:
            - array
            - "null"
      required:
        - summary
        - tips
      type: object
    FeedbackTipOutput:
      additionalProperties: false
      properties:
        advice:
          type: string
        sound:
          type: string
      required:
        - sound
        - advice
      type: object
    FormFile:
      additionalProperties: false
      properties:
        ContentType:
          type: string
        Filename:
          type: string
        IsSet:
          type: boolean
        Size:
          format: int64
          type: integer
      required:
        - ContentType
        - IsSet
        - Size
        - Filename
      type: object
    HealthOutput:
      additionalProperties: false
      properties:
        module:
          examples:
            - auth
          type: string
        status:
          examples:
            - ok
          type: string
        time:
          format: date-time
          type: string
      required:
        - status
        - time
      type: object
    Meta:
      additionalProperties: false
      properties:
        pagination:
          $ref: "#/components/schemas/Pagination"
        request_id:
          type: string
      type: object
    Pagination:
      additionalProperties: false
      properties:
        has_more:
          type: boolean
        limit:
          format: int64
          type: integer
        offset:
          format: int64
          type: integer
        total:
          format: int64
          type: integer
      required:
        - limit
        - offset
        - total
        - has_more
      type: object
    PhonemeInfoOutput:
      additionalProperties: false
      properties:
        description:
          type: string
        examples:
          type: string
        kind:
          enum:
            - vowel
            - diphthong
            - consonant
          type: string
        pitfall:
          type: string
        symbol:
          type: string
      required:
        - symbol
        - kind
        - examples
        - description
      type: object
    PhonemeOutput:
      additionalProperties: false
      properties:
        expected:
          type: string
        heard:
          type: string
        score:
          format: double
          type: number
        verdict:
          enum:
            - good
            - close
            - wrong
            - missing
          type: string
      required:
        - expected
        - score
        - verdict
      type: object
    PhonemesOutput:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/PhonemeInfoOutput"
          type:
            - array
            - "null"
      required:
        - items
      type: object
    ReadyOutput:
      additionalProperties: false
      properties:
        checks:
          items:
            $ref: "#/components/schemas/CheckResult"
          type:
            - array
            - "null"
        module:
          examples:
            - auth
          type: string
        ready:
          type: boolean
        time:
          format: date-time
          type: string
      required:
        - ready
        - time
      type: object
    SuccessBodyAssessOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/AssessOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyFeedbackOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/FeedbackOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyHealthOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/HealthOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyPhonemesOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/PhonemesOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyReadyOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/ReadyOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    WordOutput:
      additionalProperties: false
      properties:
        extra:
          items:
            type: string
          type:
            - array
            - "null"
        ipa:
          type: string
        phonemes:
          items:
            $ref: "#/components/schemas/PhonemeOutput"
          type:
            - array
            - "null"
        score:
          format: int64
          type: integer
        word:
          type: string
      required:
        - word
        - ipa
        - score
        - phonemes
        - extra
      type: object
info:
  title: speech
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/v1/speech/assess:
    post:
      operationId: assessSpeech
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
      requestBody:
        content:
          multipart/form-data:
            encoding:
              audio:
                contentType: application/octet-stream
            schema:
              properties:
                audio:
                  contentEncoding: binary
                  contentMediaType: application/octet-stream
                  format: binary
                  type: string
              required:
                - audio
              type: object
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyAssessOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Score the pronunciation of a recorded reading against the reference text
      tags:
        - speech
  /api/v1/speech/feedback:
    post:
      operationId: speechFeedback
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyFeedbackOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Get LLM coaching advice for a scored reading
      tags:
        - speech
  /api/v1/speech/phonemes:
    get:
      operationId: listSpeechPhonemes
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyPhonemesOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: List the phoneme articulation guide
      tags:
        - speech
  /health:
    get:
      description: Returns 200 if the process is alive. Does not depend on external services.
      operationId: health
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyHealthOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Liveness probe
      tags:
        - probes
  /ready:
    get:
      description: Returns 200 if the module is ready to accept traffic (all dependencies alive). 503 if any check failed.
      operationId: ready
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyReadyOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Readiness probe
      tags:
        - probes
