components:
  schemas:
    AnswerSchema:
      additionalProperties: false
      properties:
        answer:
          type: string
        correct:
          type: boolean
        correction:
          type: string
        explanation:
          type: string
      required:
        - answer
        - correct
      type: object
    BookListOutput:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/BookSchema"
          type:
            - array
            - "null"
      required:
        - items
      type: object
    BookSchema:
      additionalProperties: false
      properties:
        description:
          type: string
        level:
          type: string
        series:
          type: string
        slug:
          type: string
        title:
          type: string
      required:
        - slug
        - series
        - title
      type: object
    ChapterBody:
      additionalProperties: false
      properties:
        exercises:
          type: string
        footer:
          maxLength: 500
          type: string
        number:
          format: int64
          minimum: 1
          type: integer
        page:
          format: int64
          minimum: 0
          type: integer
        theory:
          type: string
        title:
          maxLength: 200
          minLength: 1
          type: string
        words:
          items:
            type: string
          type:
            - array
            - "null"
      required:
        - number
        - title
        - page
        - words
        - footer
        - theory
        - exercises
      type: object
    ChapterOutput:
      additionalProperties: false
      properties:
        error:
          type: string
        exercises:
          type: string
        footer:
          type: string
        number:
          format: int64
          type: integer
        page:
          format: int64
          type: integer
        status:
          enum:
            - generating
            - ready
            - error
          type: string
        theory:
          type: string
        title:
          type: string
        words:
          items:
            type: string
          type:
            - array
            - "null"
      required:
        - number
        - title
        - page
        - theory
        - exercises
        - status
      type: object
    ChaptersOutput:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/ChapterOutput"
          type:
            - array
            - "null"
      required:
        - items
      type: object
    CheckBody:
      additionalProperties: false
      properties:
        answer:
          maxLength: 4000
          minLength: 1
          type: string
        instruction:
          maxLength: 2000
          type: string
        kind:
          minLength: 1
          type: string
        number:
          format: int64
          minimum: 1
          type: integer
      required:
        - kind
        - number
        - instruction
        - answer
      type: object
    CheckOutput:
      additionalProperties: false
      properties:
        correct:
          type: boolean
        correction:
          type: string
        explanation:
          type: string
      required:
        - correct
      type: object
    CheckResult:
      additionalProperties: false
      properties:
        error:
          type: string
        name:
          examples:
            - postgres
          type: string
        ok:
          type: boolean
      required:
        - name
        - ok
      type: object
    DeleteChapterOutput:
      additionalProperties: false
      properties:
        ok:
          type: boolean
      required:
        - ok
      type: object
    EnsureBody:
      additionalProperties: false
      properties:
        aspect:
          default: square
          enum:
            - square
            - landscape
            - portrait
          type: string
        prompt:
          maxLength: 2000
          minLength: 1
          type: string
        trigger:
          type: boolean
      required:
        - prompt
        - trigger
      type: object
    ErrorBody:
      additionalProperties: false
      properties:
        code:
          type: string
        details:
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        message:
          type: string
      required:
        - code
        - message
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        field:
          type: string
        message:
          type: string
      required:
        - message
      type: object
    ErrorResponse:
      additionalProperties: false
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - error
      type: object
    GenerateChapterBody:
      additionalProperties: false
      properties:
        topic:
          maxLength: 500
          minLength: 1
          type: string
      required:
        - topic
      type: object
    HealthOutput:
      additionalProperties: false
      properties:
        module:
          examples:
            - auth
          type: string
        status:
          examples:
            - ok
          type: string
        time:
          format: date-time
          type: string
      required:
        - status
        - time
      type: object
    IllustrationOutput:
      additionalProperties: false
      properties:
        error:
          type: string
        id:
          type: string
        status:
          enum:
            - pending
            - generating
            - ready
            - error
          type: string
        url:
          type: string
      required:
        - id
        - status
      type: object
    Meta:
      additionalProperties: false
      properties:
        pagination:
          $ref: "#/components/schemas/Pagination"
        request_id:
          type: string
      type: object
    Pagination:
      additionalProperties: false
      properties:
        has_more:
          type: boolean
        limit:
          format: int64
          type: integer
        offset:
          format: int64
          type: integer
        total:
          format: int64
          type: integer
      required:
        - limit
        - offset
        - total
        - has_more
      type: object
    PracticeOKOutput:
      additionalProperties: false
      properties:
        ok:
          type: boolean
      required:
        - ok
      type: object
    ProgressOutput:
      additionalProperties: false
      properties:
        answers:
          additionalProperties:
            $ref: "#/components/schemas/AnswerSchema"
          type: object
        completed:
          type: boolean
      required:
        - answers
        - completed
      type: object
    ReadyOutput:
      additionalProperties: false
      properties:
        checks:
          items:
            $ref: "#/components/schemas/CheckResult"
          type:
            - array
            - "null"
        module:
          examples:
            - auth
          type: string
        ready:
          type: boolean
        time:
          format: date-time
          type: string
      required:
        - ready
        - time
      type: object
    SaveProgressBody:
      additionalProperties: false
      properties:
        answers:
          additionalProperties:
            $ref: "#/components/schemas/AnswerSchema"
          type: object
        completed:
          type: boolean
        variant:
          type: string
      required:
        - variant
        - answers
        - completed
      type: object
    SuccessBodyBookListOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/BookListOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyChapterOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/ChapterOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyChaptersOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/ChaptersOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyCheckOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/CheckOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyDeleteChapterOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/DeleteChapterOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyHealthOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/HealthOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyIllustrationOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/IllustrationOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyPracticeOKOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/PracticeOKOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyProgressOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/ProgressOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyReadyOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/ReadyOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyVariantSchema:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/VariantSchema"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyVariantsOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/VariantsOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    VariantSchema:
      additionalProperties: false
      properties:
        error:
          type: string
        exercises:
          type: string
        id:
          type: string
        status:
          enum:
            - generating
            - ready
            - error
          type: string
        title:
          type: string
      required:
        - id
        - title
        - exercises
        - status
      type: object
    VariantsOutput:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/VariantSchema"
          type:
            - array
            - "null"
      required:
        - items
      type: object
info:
  title: learn
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/v1/books:
    get:
      operationId: listLearnBooks
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyBookListOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: List available books with series, level and description
      tags:
        - learn
  /api/v1/books/{book}/chapters:
    get:
      operationId: listChapters
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: book
          required: true
          schema:
            minLength: 1
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyChaptersOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: List chapters of a book
      tags:
        - learn
    post:
      operationId: createChapter
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: book
          required: true
          schema:
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChapterBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyChapterOutput"
          description: Created
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Create a chapter (global admin only)
      tags:
        - learn
  /api/v1/books/{book}/chapters/generate:
    post:
      operationId: generateChapter
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: book
          required: true
          schema:
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateChapterBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyChapterOutput"
          description: Created
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Generate a chapter (theory + exercises) on a topic with the LLM (global admin only)
      tags:
        - learn
  /api/v1/books/{book}/chapters/{number}:
    delete:
      operationId: deleteChapter
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: book
          required: true
          schema:
            minLength: 1
            type: string
        - in: path
          name: number
          required: true
          schema:
            format: int64
            minimum: 1
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyDeleteChapterOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Delete a chapter (global admin only)
      tags:
        - learn
    get:
      operationId: getChapter
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: book
          required: true
          schema:
            minLength: 1
            type: string
        - in: path
          name: number
          required: true
          schema:
            format: int64
            minimum: 1
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyChapterOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Get a single chapter by number
      tags:
        - learn
    put:
      operationId: updateChapter
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: book
          required: true
          schema:
            minLength: 1
            type: string
        - in: path
          name: number
          required: true
          schema:
            format: int64
            minimum: 1
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChapterBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyChapterOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Update a chapter (global admin only)
      tags:
        - learn
  /api/v1/illustrations:
    post:
      operationId: ensureIllustration
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnsureBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyIllustrationOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Trigger or poll generation of an illustration from a prompt
      tags:
        - learn
  /api/v1/practice/check:
    post:
      operationId: checkPracticeAnswer
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyCheckOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Validate a free-form answer with the LLM
      tags:
        - learn
  /api/v1/practice/variants/{id}:
    delete:
      operationId: deletePracticeVariant
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyPracticeOKOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Delete a generated practice variant
      tags:
        - learn
  /api/v1/practice/{kind}/{number}/progress:
    delete:
      operationId: resetPracticeProgress
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: kind
          required: true
          schema:
            minLength: 1
            type: string
        - in: path
          name: number
          required: true
          schema:
            format: int64
            minimum: 1
            type: integer
        - explode: false
          in: query
          name: variant
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyPracticeOKOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Reset saved answers for a chapter variant
      tags:
        - learn
    get:
      operationId: getPracticeProgress
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: kind
          required: true
          schema:
            minLength: 1
            type: string
        - in: path
          name: number
          required: true
          schema:
            format: int64
            minimum: 1
            type: integer
        - explode: false
          in: query
          name: variant
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyProgressOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Get saved answers and completion for a chapter variant
      tags:
        - learn
    put:
      operationId: savePracticeProgress
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: kind
          required: true
          schema:
            minLength: 1
            type: string
        - in: path
          name: number
          required: true
          schema:
            format: int64
            minimum: 1
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveProgressBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyPracticeOKOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Save answers and completion for a chapter variant
      tags:
        - learn
  /api/v1/practice/{kind}/{number}/variants:
    get:
      operationId: listPracticeVariants
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: kind
          required: true
          schema:
            minLength: 1
            type: string
        - in: path
          name: number
          required: true
          schema:
            format: int64
            minimum: 1
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyVariantsOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: List generated practice variants for a chapter
      tags:
        - learn
    post:
      operationId: generatePracticeVariant
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: kind
          required: true
          schema:
            minLength: 1
            type: string
        - in: path
          name: number
          required: true
          schema:
            format: int64
            minimum: 1
            type: integer
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyVariantSchema"
          description: Created
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Generate a new practice variant with the LLM
      tags:
        - learn
  /health:
    get:
      description: Returns 200 if the process is alive. Does not depend on external services.
      operationId: health
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyHealthOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Liveness probe
      tags:
        - probes
  /ready:
    get:
      description: Returns 200 if the module is ready to accept traffic (all dependencies alive). 503 if any check failed.
      operationId: ready
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyReadyOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Readiness probe
      tags:
        - probes
