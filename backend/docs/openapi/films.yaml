components:
  schemas:
    AudioTrackOutput:
      additionalProperties: false
      properties:
        label:
          type: string
        lang:
          type: string
        url:
          type: string
      required:
        - lang
        - label
        - url
      type: object
    CheckResult:
      additionalProperties: false
      properties:
        error:
          type: string
        name:
          examples:
            - postgres
          type: string
        ok:
          type: boolean
      required:
        - name
        - ok
      type: object
    CueOutput:
      additionalProperties: false
      properties:
        end_ms:
          format: int64
          type: integer
        index:
          format: int64
          type: integer
        start_ms:
          format: int64
          type: integer
        text:
          type: string
      required:
        - index
        - start_ms
        - end_ms
        - text
      type: object
    DeleteFilmOutput:
      additionalProperties: false
      properties:
        ok:
          type: boolean
      required:
        - ok
      type: object
    ErrorBody:
      additionalProperties: false
      properties:
        code:
          type: string
        details:
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        message:
          type: string
      required:
        - code
        - message
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        field:
          type: string
        message:
          type: string
      required:
        - message
      type: object
    ErrorResponse:
      additionalProperties: false
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - error
      type: object
    FilmOutput:
      additionalProperties: false
      properties:
        audio_tracks:
          items:
            $ref: "#/components/schemas/AudioTrackOutput"
          type:
            - array
            - "null"
        created_at:
          type: string
        description:
          type: string
        duration_ms:
          format: int64
          type: integer
        episode:
          format: int64
          type: integer
        error:
          type: string
        id:
          type: string
        kind:
          type: string
        position_ms:
          format: int64
          type: integer
        poster_url:
          type: string
        season:
          format: int64
          type: integer
        series_title:
          type: string
        status:
          type: string
        subtitles:
          items:
            $ref: "#/components/schemas/SubtitleTrackOutput"
          type:
            - array
            - "null"
        title:
          type: string
      required:
        - id
        - title
        - duration_ms
        - position_ms
        - status
        - kind
        - season
        - episode
        - audio_tracks
        - subtitles
        - created_at
      type: object
    FilmSummary:
      additionalProperties: false
      properties:
        created_at:
          type: string
        description:
          type: string
        duration_ms:
          format: int64
          type: integer
        episode:
          format: int64
          type: integer
        id:
          type: string
        kind:
          type: string
        position_ms:
          format: int64
          type: integer
        poster_url:
          type: string
        season:
          format: int64
          type: integer
        series_title:
          type: string
        status:
          type: string
        title:
          type: string
      required:
        - id
        - title
        - duration_ms
        - position_ms
        - status
        - kind
        - season
        - episode
        - created_at
      type: object
    FilmsOutput:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/FilmSummary"
          type:
            - array
            - "null"
      required:
        - items
      type: object
    FormFile:
      additionalProperties: false
      properties:
        ContentType:
          type: string
        Filename:
          type: string
        IsSet:
          type: boolean
        Size:
          format: int64
          type: integer
      required:
        - ContentType
        - IsSet
        - Size
        - Filename
      type: object
    HealthOutput:
      additionalProperties: false
      properties:
        module:
          examples:
            - auth
          type: string
        status:
          examples:
            - ok
          type: string
        time:
          format: date-time
          type: string
      required:
        - status
        - time
      type: object
    Meta:
      additionalProperties: false
      properties:
        pagination:
          $ref: "#/components/schemas/Pagination"
        request_id:
          type: string
      type: object
    Pagination:
      additionalProperties: false
      properties:
        has_more:
          type: boolean
        limit:
          format: int64
          type: integer
        offset:
          format: int64
          type: integer
        total:
          format: int64
          type: integer
      required:
        - limit
        - offset
        - total
        - has_more
      type: object
    ReadyOutput:
      additionalProperties: false
      properties:
        checks:
          items:
            $ref: "#/components/schemas/CheckResult"
          type:
            - array
            - "null"
        module:
          examples:
            - auth
          type: string
        ready:
          type: boolean
        time:
          format: date-time
          type: string
      required:
        - ready
        - time
      type: object
    SaveProgressInputBody:
      additionalProperties: false
      properties:
        position_ms:
          format: int64
          minimum: 0
          type: integer
      required:
        - position_ms
      type: object
    SaveProgressOutput:
      additionalProperties: false
      properties:
        ok:
          type: boolean
      required:
        - ok
      type: object
    SeriesListOutput:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/SeriesOutput"
          type:
            - array
            - "null"
      required:
        - items
      type: object
    SeriesOutput:
      additionalProperties: false
      properties:
        description:
          type: string
        poster_url:
          type: string
        title:
          type: string
      required:
        - title
      type: object
    SubtitleTrackOutput:
      additionalProperties: false
      properties:
        cues:
          items:
            $ref: "#/components/schemas/CueOutput"
          type:
            - array
            - "null"
        label:
          type: string
        lang:
          type: string
      required:
        - lang
        - label
        - cues
      type: object
    SuccessBodyDeleteFilmOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/DeleteFilmOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyFilmOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/FilmOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyFilmsOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/FilmsOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyHealthOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/HealthOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyReadyOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/ReadyOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodySaveProgressOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/SaveProgressOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodySeriesListOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/SeriesListOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodySeriesOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/SeriesOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
info:
  title: films
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/v1/films:
    get:
      operationId: listFilms
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyFilmsOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: List films
      tags:
        - films
    post:
      operationId: uploadFilm
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
      requestBody:
        content:
          multipart/form-data:
            encoding:
              poster:
                contentType: image/png,image/jpeg,image/webp
              subtitles:
                contentType: application/octet-stream
              video:
                contentType: application/octet-stream
            schema:
              properties:
                poster:
                  contentEncoding: binary
                  contentMediaType: application/octet-stream
                  format: binary
                  type: string
                subtitles:
                  contentEncoding: binary
                  contentMediaType: application/octet-stream
                  format: binary
                  type: string
                video:
                  contentEncoding: binary
                  contentMediaType: application/octet-stream
                  format: binary
                  type: string
              required:
                - video
              type: object
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyFilmOutput"
          description: Accepted
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Upload a film; tracks are transcoded in the background (global admin only)
      tags:
        - films
  /api/v1/films/{id}:
    delete:
      operationId: deleteFilm
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyDeleteFilmOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Delete a film (global admin only)
      tags:
        - films
    get:
      operationId: getFilm
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyFilmOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Get a film with audio and subtitle tracks
      tags:
        - films
    patch:
      operationId: updateFilm
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            encoding:
              poster:
                contentType: image/png,image/jpeg,image/webp
            schema:
              properties:
                poster:
                  contentEncoding: binary
                  contentMediaType: application/octet-stream
                  format: binary
                  type: string
              type: object
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyFilmOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Update a film's title, description and poster (global admin only)
      tags:
        - films
  /api/v1/films/{id}/progress:
    put:
      operationId: saveFilmProgress
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveProgressInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodySaveProgressOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Save the watch position for a film
      tags:
        - films
  /api/v1/series:
    get:
      operationId: listSeries
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodySeriesListOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: List series metadata (cover and description)
      tags:
        - films
    patch:
      operationId: updateSeries
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
      requestBody:
        content:
          multipart/form-data:
            encoding:
              poster:
                contentType: image/png,image/jpeg,image/webp
            schema:
              properties:
                poster:
                  contentEncoding: binary
                  contentMediaType: application/octet-stream
                  format: binary
                  type: string
              type: object
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodySeriesOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Update a series title, description and cover (global admin only)
      tags:
        - films
  /health:
    get:
      description: Returns 200 if the process is alive. Does not depend on external services.
      operationId: health
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyHealthOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Liveness probe
      tags:
        - probes
  /ready:
    get:
      description: Returns 200 if the module is ready to accept traffic (all dependencies alive). 503 if any check failed.
      operationId: ready
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyReadyOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Readiness probe
      tags:
        - probes
