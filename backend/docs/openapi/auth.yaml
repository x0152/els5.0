components:
  schemas:
    CheckResult:
      additionalProperties: false
      properties:
        error:
          type: string
        name:
          examples:
            - postgres
          type: string
        ok:
          type: boolean
      required:
        - name
        - ok
      type: object
    EmptyOutput:
      additionalProperties: false
      type: object
    ErrorBody:
      additionalProperties: false
      properties:
        code:
          type: string
        details:
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        message:
          type: string
      required:
        - code
        - message
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        field:
          type: string
        message:
          type: string
      required:
        - message
      type: object
    ErrorResponse:
      additionalProperties: false
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - error
      type: object
    ForgotPasswordInputBody:
      additionalProperties: false
      properties:
        email:
          format: email
          type: string
      required:
        - email
      type: object
    ForgotPasswordOutput:
      additionalProperties: false
      properties:
        Body:
          $ref: "#/components/schemas/ForgotPasswordOutputBodyStruct"
      required:
        - Body
      type: object
    ForgotPasswordOutputBodyStruct:
      additionalProperties: false
      properties:
        sent_to:
          type: string
      required:
        - sent_to
      type: object
    HealthOutput:
      additionalProperties: false
      properties:
        module:
          examples:
            - auth
          type: string
        status:
          examples:
            - ok
          type: string
        time:
          format: date-time
          type: string
      required:
        - status
        - time
      type: object
    ImpersonateInputBody:
      additionalProperties: false
      properties:
        account_id:
          minLength: 1
          type: string
      required:
        - account_id
      type: object
    LoginConfirmInputBody:
      additionalProperties: false
      properties:
        token:
          minLength: 1
          type: string
      required:
        - token
      type: object
    LoginStartInputBody:
      additionalProperties: false
      properties:
        email:
          format: email
          type: string
        password:
          maxLength: 128
          minLength: 1
          type: string
      required:
        - email
        - password
      type: object
    Meta:
      additionalProperties: false
      properties:
        pagination:
          $ref: "#/components/schemas/Pagination"
        request_id:
          type: string
      type: object
    Pagination:
      additionalProperties: false
      properties:
        has_more:
          type: boolean
        limit:
          format: int64
          type: integer
        offset:
          format: int64
          type: integer
        total:
          format: int64
          type: integer
      required:
        - limit
        - offset
        - total
        - has_more
      type: object
    PasswordChangedOutput:
      additionalProperties: false
      properties:
        email:
          type: string
      required:
        - email
      type: object
    ReadyOutput:
      additionalProperties: false
      properties:
        checks:
          items:
            $ref: "#/components/schemas/CheckResult"
          type:
            - array
            - "null"
        module:
          examples:
            - auth
          type: string
        ready:
          type: boolean
        time:
          format: date-time
          type: string
      required:
        - ready
        - time
      type: object
    ResendInviteInputBody:
      additionalProperties: false
      properties:
        email:
          format: email
          type: string
      required:
        - email
      type: object
    ResendInviteOutput:
      additionalProperties: false
      properties:
        Body:
          $ref: "#/components/schemas/ResendInviteOutputBodyStruct"
      required:
        - Body
      type: object
    ResendInviteOutputBodyStruct:
      additionalProperties: false
      properties:
        sent_to:
          type: string
      required:
        - sent_to
      type: object
    ResetPasswordInputBody:
      additionalProperties: false
      properties:
        password:
          maxLength: 128
          minLength: 1
          type: string
        password_confirm:
          maxLength: 128
          minLength: 1
          type: string
        token:
          minLength: 1
          type: string
      required:
        - token
        - password
        - password_confirm
      type: object
    SessionOutput:
      additionalProperties: false
      properties:
        account_id:
          type: string
        email:
          type: string
        expires_at:
          format: date-time
          type: string
        token:
          type: string
      required:
        - account_id
        - email
        - token
        - expires_at
      type: object
    SetPasswordInputBody:
      additionalProperties: false
      properties:
        password:
          maxLength: 128
          minLength: 1
          type: string
        password_confirm:
          maxLength: 128
          minLength: 1
          type: string
        token:
          minLength: 1
          type: string
      required:
        - token
        - password
        - password_confirm
      type: object
    SuccessBodyEmptyOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/EmptyOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyForgotPasswordOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/ForgotPasswordOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyHealthOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/HealthOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyPasswordChangedOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/PasswordChangedOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyReadyOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/ReadyOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodyResendInviteOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/ResendInviteOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
    SuccessBodySessionOutput:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/SessionOutput"
        meta:
          $ref: "#/components/schemas/Meta"
        ok:
          type: boolean
      required:
        - ok
        - data
      type: object
info:
  title: auth
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/v1/auth/forgot-password:
    post:
      operationId: forgotPassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInputBody"
        required: true
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyForgotPasswordOutput"
          description: Accepted
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Request password reset email
      tags:
        - auth
  /api/v1/auth/impersonate:
    post:
      operationId: impersonate
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImpersonateInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodySessionOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Issue a session token for another account (dev-only, global admin)
      tags:
        - auth
  /api/v1/auth/login:
    post:
      operationId: loginStart
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginStartInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodySessionOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Sign in with email and password
      tags:
        - auth
  /api/v1/auth/login/confirm:
    post:
      operationId: loginConfirm
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginConfirmInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodySessionOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Confirm magic login and issue a session token
      tags:
        - auth
  /api/v1/auth/logout:
    post:
      operationId: logout
      parameters:
        - description: Bearer <token>
          in: header
          name: Authorization
          schema:
            description: Bearer <token>
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyEmptyOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Revoke current session
      tags:
        - auth
  /api/v1/auth/resend-invite:
    post:
      operationId: resendInvite
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendInviteInputBody"
        required: true
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyResendInviteOutput"
          description: Accepted
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Resend set-password invite to a pending account
      tags:
        - auth
  /api/v1/auth/reset-password:
    post:
      operationId: resetPassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyPasswordChangedOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Reset password via reset-password token (single-use, 1h TTL); user must log in afterwards
      tags:
        - auth
  /api/v1/auth/set-password:
    post:
      operationId: setPassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetPasswordInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyPasswordChangedOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Set initial password via invite token (single-use); user must log in afterwards
      tags:
        - auth
  /health:
    get:
      description: Returns 200 if the process is alive. Does not depend on external services.
      operationId: health
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyHealthOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Liveness probe
      tags:
        - probes
  /ready:
    get:
      description: Returns 200 if the module is ready to accept traffic (all dependencies alive). 503 if any check failed.
      operationId: ready
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBodyReadyOutput"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Error
      summary: Readiness probe
      tags:
        - probes
