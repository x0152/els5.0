stages:
  - build
  - deploy

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_TAG

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: 1
  K8S_AGENT_CONTEXT: "e.evdomashenko/els5.0:yonder"
  GO_VERSION: "1.25.11"

.build_template:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - export IMAGE_TAG="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
    - cd $BUILD_DIR
    - |
      if [ ! -f "$DOCKERFILE" ]; then
        echo "File $DOCKERFILE not found in $BUILD_DIR. Skipping."
        exit 0
      fi
    - echo $CI_JOB_TOKEN | docker login -u gitlab-ci-token --password-stdin $CI_REGISTRY
    - docker buildx create --use --driver docker-container
    - |
      if [ "${NO_CACHE:-0}" = "1" ]; then
        echo "NO_CACHE=1: buildx will build without cache (--no-cache --pull)."
        docker buildx build \
          --no-cache --pull \
          -f $DOCKERFILE \
          --build-arg VERSION=$IMAGE_TAG \
          --build-arg GIT_COMMIT=$CI_COMMIT_SHORT_SHA \
          -t $CI_REGISTRY_IMAGE/$IMAGE_NAME:$IMAGE_TAG \
          --push .
      else
        docker buildx build \
          --cache-from type=registry,ref=$CI_REGISTRY_IMAGE/$IMAGE_NAME:cache \
          --cache-to type=registry,ref=$CI_REGISTRY_IMAGE/$IMAGE_NAME:cache,mode=max \
          -f $DOCKERFILE \
          --build-arg VERSION=$IMAGE_TAG \
          --build-arg GIT_COMMIT=$CI_COMMIT_SHORT_SHA \
          -t $CI_REGISTRY_IMAGE/$IMAGE_NAME:$IMAGE_TAG \
          --push .
      fi

build:backend:
  extends: .build_template
  variables:
    BUILD_DIR: "backend"
    DOCKERFILE: "Dockerfile.prod"
    IMAGE_NAME: "backend"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d/ || $CI_COMMIT_TAG =~ /^stage-/
    - if: $CI_COMMIT_BRANCH == "develop"
      when: manual
      allow_failure: true

build:frontend:
  extends: .build_template
  variables:
    BUILD_DIR: "frontend"
    DOCKERFILE: "Dockerfile"
    IMAGE_NAME: "frontend"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d/ || $CI_COMMIT_TAG =~ /^stage-/
    - if: $CI_COMMIT_BRANCH == "develop"
      when: manual
      allow_failure: true

build:spacy:
  extends: .build_template
  variables:
    BUILD_DIR: "services/spacy"
    DOCKERFILE: "Dockerfile"
    IMAGE_NAME: "spacy"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d/ || $CI_COMMIT_TAG =~ /^stage-/
    - if: $CI_COMMIT_BRANCH == "develop"
      when: manual
      allow_failure: true

.deploy_template:
  stage: deploy
  image: dtzar/helm-kubectl:3.14.0
  variables:
    GIT_DEPTH: "0"
  before_script:
    - apk add --no-cache bash curl git
    - |
      if [ -z "$EXPECTED_BRANCH" ]; then
        echo "EXPECTED_BRANCH is not set for $CI_JOB_NAME"
        exit 1
      fi
      git fetch --no-tags origin "+refs/heads/$EXPECTED_BRANCH:refs/remotes/origin/$EXPECTED_BRANCH"
      if ! git merge-base --is-ancestor "$CI_COMMIT_SHA" "refs/remotes/origin/$EXPECTED_BRANCH"; then
        echo "Tag $CI_COMMIT_TAG ($CI_COMMIT_SHORT_SHA) is not on branch origin/$EXPECTED_BRANCH."
        echo "Rule: stage-* tags are only allowed on develop, v* tags only on main."
        exit 1
      fi
    - curl --silent "https://gitlab.com/gitlab-org/incubation-engineering/mobile-devops/download-secure-files/-/raw/main/installer" | bash
    - download-secure-files
    - |
      if [ -f ".secure_files/$SECRETS_FILE" ]; then
        cp ".secure_files/$SECRETS_FILE" ./deployments/helm/templates/secrets.yaml
      else
        echo "Secure file $SECRETS_FILE not found. Upload it in Settings → CI/CD → Secure Files."
        exit 1
      fi
  script:
    - export IMAGE_TAG="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
    - kubectl config use-context "$K8S_AGENT_CONTEXT"
    - kubectl get nodes
    - kubectl create namespace "$K8S_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
    - |
      kubectl delete secret gitlab-registry-secret -n "$K8S_NAMESPACE" --ignore-not-found=true
      kubectl create secret docker-registry gitlab-registry-secret \
        --docker-server="$CI_REGISTRY" \
        --docker-username="$CI_REGISTRY_USER" \
        --docker-password="$CI_REGISTRY_PASSWORD" \
        --docker-email="$GITLAB_USER_EMAIL" \
        --namespace="$K8S_NAMESPACE"
    - |
      helm upgrade --install els-expert ./deployments/helm \
        --namespace "$K8S_NAMESPACE" --create-namespace \
        -f ./deployments/helm/values.yaml \
        -f ./deployments/helm/values-prod.yaml \
        $EXTRA_VALUES \
        --set apps.global.image.repository=$CI_REGISTRY_IMAGE/backend \
        --set apps.global.image.tag=$IMAGE_TAG \
        --set frontend.image.repository=$CI_REGISTRY_IMAGE/frontend \
        --set frontend.image.tag=$IMAGE_TAG \
        --set spacy.image.repository=$CI_REGISTRY_IMAGE/spacy \
        --set spacy.image.tag=$IMAGE_TAG \
        --atomic --cleanup-on-fail --timeout=30m

deploy:stage:
  extends: .deploy_template
  environment:
    name: staging
    url: https://staging.els.expert
  variables:
    K8S_NAMESPACE: "els-expert-stage"
    EXTRA_VALUES: "-f ./deployments/helm/values-stage.yaml"
    SECRETS_FILE: "secrets-stage.yaml"
    EXPECTED_BRANCH: "develop"
  rules:
    - if: $CI_COMMIT_TAG =~ /^stage-/

deploy:prod:
  extends: .deploy_template
  environment:
    name: production
    url: https://app.els.expert
  variables:
    K8S_NAMESPACE: "els-expert-prod"
    EXTRA_VALUES: ""
    SECRETS_FILE: "secrets-prod.yaml"
    EXPECTED_BRANCH: "main"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d/
