# Nginx vhost for the ELS (English Learning System) SPA.
# /api/* is routed by the cluster Ingress directly to backend services, so we
# don't proxy here. Nginx just serves static assets + SPA history fallback.

server {
    listen       8080;
    listen  [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Long-term cache for hashed Vite assets.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # No-cache for the entry point so new releases are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Lightweight health endpoint for k8s probes / HEALTHCHECK.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/javascript application/json
                      application/xml application/xml+rss image/svg+xml font/ttf
                      font/otf application/font-woff application/font-woff2;
}
