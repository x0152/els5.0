{{- if .Values.redis.enabled }}
{{- $usePassword := (default false .Values.redis.auth.enabled) -}}
---
{{- if .Values.redis.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.redis.service.name }}-data
  labels:
    {{- include "els-expert.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.redis.persistence.size }}
  {{- with .Values.redis.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.redis.service.name }}
  labels:
    {{- include "els-expert.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "els-expert.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "els-expert.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          command: ["redis-server"]
          args:
            - "--appendonly"
            - "yes"
            {{- if $usePassword }}
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
            {{- end }}
          ports:
            - name: redis
              containerPort: {{ .Values.redis.service.port }}
          env:
            - name: TZ
              value: {{ .Values.global.timezone | quote }}
            {{- if $usePassword }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "els-expert.secretName" . }}
                  key: REDIS_PASSWORD
            {{- end }}
          livenessProbe:
            exec:
              command:
                {{- if $usePassword }}
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" --no-auth-warning ping | grep -q PONG
                {{- else }}
                - redis-cli
                - ping
                {{- end }}
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            exec:
              command:
                {{- if $usePassword }}
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" --no-auth-warning ping | grep -q PONG
                {{- else }}
                - redis-cli
                - ping
                {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          {{- if .Values.redis.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
      {{- if .Values.redis.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.redis.service.name }}-data
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.redis.service.name }}
  labels:
    {{- include "els-expert.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: {{ .Values.redis.service.port }}
      targetPort: redis
      protocol: TCP
  selector:
    {{- include "els-expert.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
{{- end }}
