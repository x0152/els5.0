{{- if .Values.spacy.enabled }}
{{- $fullName := printf "%s-spacy" (include "els-expert.fullname" .) -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "els-expert.labels" . | nindent 4 }}
    app.kubernetes.io/component: spacy
spec:
  replicas: {{ .Values.spacy.replicaCount }}
  selector:
    matchLabels:
      {{- include "els-expert.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: spacy
  template:
    metadata:
      labels:
        {{- include "els-expert.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: spacy
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: spacy
          image: "{{ .Values.spacy.image.repository }}:{{ .Values.spacy.image.tag }}"
          imagePullPolicy: {{ .Values.spacy.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: {{ .Values.spacy.service.port }}
          env:
            - name: TZ
              value: {{ .Values.global.timezone | quote }}
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.spacy.resources | nindent 12 }}
      {{- with .Values.apps.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "els-expert.labels" . | nindent 4 }}
    app.kubernetes.io/component: spacy
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.spacy.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "els-expert.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: spacy
{{- end }}
