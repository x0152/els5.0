{{- /*
One Deployment per enabled backend service in .Values.apps. Defaults from
.Values.apps.global, per-service overrides from the app block.
*/ -}}
{{- range $appName, $appCfg := .Values.apps }}
{{- if and (ne $appName "global") $appCfg.enabled }}
{{- $global := $.Values.apps.global -}}
{{- $fullAppName := include "els-expert.appName" (dict "ctx" $ "app" $appName) -}}
{{- $resources := default $global.resources $appCfg.resources -}}
{{- $strategy := default $global.deploymentStrategy $appCfg.deploymentStrategy -}}
{{- /* Skip replicas when HPA owns scaling, otherwise Helm fights the HPA. */ -}}
{{- $hpaEnabled := false -}}
{{- if hasKey $appCfg "autoscaling" -}}
  {{- $hpaEnabled = (default false $appCfg.autoscaling.enabled) -}}
{{- else -}}
  {{- $hpaEnabled = (default false $global.autoscaling.enabled) -}}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullAppName }}
  labels:
    {{- include "els-expert.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $appName }}
spec:
  {{- if not $hpaEnabled }}
  replicas: {{ $appCfg.replicaCount | default 1 }}
  {{- end }}
  strategy:
    type: {{ $strategy.type }}
    {{- if eq $strategy.type "RollingUpdate" }}
    rollingUpdate:
      maxUnavailable: {{ $strategy.rollingUpdate.maxUnavailable }}
      maxSurge: {{ $strategy.rollingUpdate.maxSurge }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "els-expert.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $appName }}
  template:
    metadata:
      labels:
        {{- include "els-expert.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $appName }}
      {{- with $global.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $global.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-db
          image: "{{ $.Values.postgres.image.repository }}:{{ $.Values.postgres.image.tag }}"
          imagePullPolicy: {{ $.Values.postgres.image.pullPolicy }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command: ["sh", "-c"]
          args:
            - |
              until pg_isready -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER"; do
                echo "waiting for postgres..."
                sleep 2
              done
              export PGPASSWORD="$POSTGRES_PASSWORD"
              until [ "$(psql -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" -d "$POSTGRES_DATABASE" -tAc "SELECT to_regclass('public.schema_migrations') IS NOT NULL" 2>/dev/null)" = "t" ]; do
                echo "waiting for migrations..."
                sleep 3
              done
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "els-expert.configName" $ }}
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "els-expert.configName" $ }}
                  key: POSTGRES_PORT
            - name: POSTGRES_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "els-expert.secretName" $ }}
                  key: POSTGRES_DATABASE
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "els-expert.secretName" $ }}
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "els-expert.secretName" $ }}
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      containers:
        - name: {{ $appName }}
          image: "{{ $global.image.repository }}:{{ $global.image.tag }}"
          imagePullPolicy: {{ $global.image.pullPolicy }}
          {{- with $global.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $appCfg.command }}
          command: {{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with $appCfg.args }}
          args: {{ toYaml . | nindent 12 }}
          {{- end }}
          {{- if $appCfg.port }}
          ports:
            - name: http
              containerPort: {{ $appCfg.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ $appCfg.healthPath | default "/health" }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ $appCfg.readyPath | default "/ready" }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- end }}
          env:
            {{- include "els-expert.commonEnv" $ | nindent 12 }}
            {{- with $appCfg.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml $resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 40Gi
      {{- with $global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
