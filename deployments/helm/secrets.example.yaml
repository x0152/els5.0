# Example Secret for els-expert.
# Copy → fill in real values → upload to GitLab:
#   Settings → CI/CD → Secure Files (file name: secrets-stage.yaml or secrets-prod.yaml)
# CI will copy it into templates/secrets.yaml before helm upgrade.

apiVersion: v1
kind: Secret
metadata:
  name: els-expert-secrets
  labels:
    app.kubernetes.io/name: els-expert
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  POSTGRES_DATABASE: "els_expert"
  POSTGRES_USER: "els"
  POSTGRES_PASSWORD: "CHANGE_ME"
  REDIS_PASSWORD: ""
  S3_ACCESS_KEY: "CHANGE_ME"
  S3_SECRET_KEY: "CHANGE_ME"
  SMTP_USER: ""
  SMTP_PASSWORD: ""
  LLM_API_KEY: "CHANGE_ME"
  BOOTSTRAP_ADMIN_EMAIL: "admin@els.expert"
  BOOTSTRAP_ADMIN_PASSWORD: "CHANGE_ME"
  BOOTSTRAP_ADMIN_FIRST_NAME: "Root"
  BOOTSTRAP_ADMIN_LAST_NAME: "Admin"
